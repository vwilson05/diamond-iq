<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayIQ — Sports & Strategy Training</title>
  <link rel="stylesheet" href="/css/style.css?v=20260420d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
  <!-- AUTH SCREEN -->
  <div id="screen-auth" class="screen active">
    <div class="select-screen-inner" id="auth-container"></div>
  </div>

  <!-- TEAM SELECT SCREEN -->
  <div id="screen-team-select" class="screen">
    <div class="select-screen-inner">
      <div class="logo-header">
        <h1 class="logo">PLAY<span class="logo-accent">IQ</span></h1>
        <p class="tagline">Think the game. Play the game.</p>
      </div>
      <button class="back-btn" id="back-to-sport"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Sport</button>
      <h2 class="select-heading">Pick Your Team</h2>
      <div id="team-grid" class="team-grid"></div>
    </div>
  </div>

  <!-- SPORT SELECT SCREEN -->
  <div id="screen-sport-select" class="screen">
    <div class="select-screen-inner">
      <div class="logo-header small">
        <h1 class="logo">PLAY<span class="logo-accent">IQ</span></h1>
      </div>
      <h2 class="select-heading" id="sport-select-heading">Choose a Category</h2>
      <div id="sport-select-content"></div>
    </div>
  </div>

  <!-- DIFFICULTY SELECT SCREEN -->
  <div id="screen-difficulty-select" class="screen">
    <div class="select-screen-inner">
      <div class="logo-header small">
        <h1 class="logo">PLAY<span class="logo-accent">IQ</span></h1>
      </div>
      <button class="back-btn" id="back-to-team"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Team</button>
      <h2 class="select-heading">Choose Your Level</h2>
      <div id="difficulty-cards" class="difficulty-cards"></div>
    </div>
  </div>

  <!-- GAME SCREEN (split view) -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="game-header-left">
        <span class="logo-sm">PLAY<span class="logo-accent">IQ</span></span>
        <span id="game-tier-badge" class="tier-badge"></span>
      </div>
      <div class="game-header-center">
        <span id="game-iq-display" class="iq-display">IQ: 0</span>
        <span id="game-token-display" class="token-display" style="margin-left:0.6rem;"></span>
      </div>
      <div class="game-header-right">
        <span id="game-scenario-count" class="scenario-count"></span>
        <div class="menu-wrapper">
          <button id="btn-menu" class="btn-menu" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><line x1="2" y1="4" x2="16" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <div id="game-menu" class="game-menu hidden">
            <button class="menu-item" id="menu-profile">My Profile</button>
            <button class="menu-item" id="menu-change-team">Change Team</button>
            <button class="menu-item" id="menu-change-level">Change Level</button>
            <button class="menu-item" id="menu-end">End Session</button>
            <button class="menu-item menu-item-danger" id="menu-logout">Log Out</button>
          </div>
        </div>
      </div>
    </div>
    <div class="game-body">
      <div class="game-left">
        <div id="scenario-panel" class="scenario-panel"></div>
      </div>
      <div class="game-right">
        <canvas id="field-canvas"></canvas>
        <div id="scoreboard-container" class="scoreboard-container"></div>
      </div>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div id="screen-review" class="screen">
    <div id="review-container" class="review-container"></div>
  </div>

  <script type="module" src="/js/app.js?v=20260421a"></script>
</body>
</html>
